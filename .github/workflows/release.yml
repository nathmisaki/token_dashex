name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the artifact to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  macos-arm64-burrito:
    name: Cross-build self-contained macOS arm64 binary (Burrito)
    runs-on: ubuntu-latest
    env:
      MIX_ENV: prod
      ELIXIR_VERSION: "1.19.4"
      OTP_VERSION: "28.0"
      ZIG_VERSION: "0.13.0"
      # exqlite + cc_precompiler resolve NIFs against the host triple
      # unless overridden. Force the macOS arm64 prebuilt artefact so
      # the bundled NIF runs on Apple Silicon.
      CC_PRECOMPILER_CURRENT_TARGET: aarch64-apple-darwin
      # Build Burrito's launcher only for the target we ship.
      BURRITO_TARGET: macos_arm64
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Erlang + Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install xz + 7zip (Burrito runtime requirements)
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils p7zip-full

      - name: Cache mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod
          key: ${{ runner.os }}-burrito-mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-burrito-mix-

      - name: Cache Burrito downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/burrito_file_cache
          key: burrito-cache-otp-${{ env.OTP_VERSION }}-zig-${{ env.ZIG_VERSION }}

      - name: Fetch deps
        run: mix deps.get --only prod

      - name: Compile (NIFs target aarch64-apple-darwin)
        run: mix compile

      - name: Build assets
        run: mix assets.deploy

      - name: Build Burrito self-contained binary
        run: mix release token_dashex_app --overwrite

      - name: Verify NIF architecture
        run: |
          set -euo pipefail
          NIF=$(find _build/prod -name 'sqlite3_nif.so' | head -1)
          if [ -z "$NIF" ]; then
            echo "exqlite NIF not found" >&2
            exit 1
          fi
          file "$NIF"
          file "$NIF" | grep -q "Mach-O .*arm64" || {
            echo "NIF is not Mach-O arm64" >&2
            exit 1
          }

      - name: Locate Burrito output
        id: locate
        run: |
          set -euo pipefail
          BIN=$(find burrito_out -type f -name '*macos_arm64*' | head -1)
          if [ -z "$BIN" ]; then
            echo "Burrito binary not found in burrito_out/" >&2
            ls -la burrito_out/ || true
            exit 1
          fi
          echo "binary=$BIN" >> "$GITHUB_OUTPUT"
          ls -lh "$BIN"

      - name: Package binary + checksum
        id: package
        env:
          TAG: ${{ env.RELEASE_TAG }}
          BIN: ${{ steps.locate.outputs.binary }}
        run: |
          set -euo pipefail
          if [ -z "${TAG:-}" ]; then
            echo "RELEASE_TAG is empty; aborting" >&2
            exit 1
          fi
          OUT="token_dashex-${TAG}-macos-arm64"
          cp "$BIN" "$OUT"
          chmod +x "$OUT"
          sha256sum "$OUT" > "$OUT.sha256"
          echo "binary=$OUT" >> "$GITHUB_OUTPUT"
          echo "checksum=$OUT.sha256" >> "$GITHUB_OUTPUT"
          ls -lh "$OUT" "$OUT.sha256"

      - name: Upload artifact (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: token_dashex-macos-arm64
          path: |
            ${{ steps.package.outputs.binary }}
            ${{ steps.package.outputs.checksum }}

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ steps.package.outputs.binary }}
            ${{ steps.package.outputs.checksum }}
          body: |
            **macOS arm64 self-contained binary**

            Embeds Erlang/OTP and the Phoenix release. No prerequisites.

            ```bash
            curl -L -o token_dashex \
              https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/token_dashex-${{ env.RELEASE_TAG }}-macos-arm64
            chmod +x token_dashex
            xattr -d com.apple.quarantine token_dashex 2>/dev/null || true

            ./token_dashex eval 'TokenDashex.Release.migrate()'
            PHX_SERVER=true ./token_dashex start
            ```

            Database lives at `~/.claude/token-dashex.db` by default.
